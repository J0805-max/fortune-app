function $(id){return document.getElementById(id);}

function renderToday(){
  var d=new Date();
  var w=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  $("todayDate").innerHTML=d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+w[d.getDay()];
  $("lunarDate").innerHTML=showLunar?"农历五月初八":"";
  $("zodiacLabel").innerHTML="⚖️ "+myZodiac+" · "+zEn[myZodiac];
  var f=allF[myZodiac];
  $("overviewText").innerHTML=f[0];$("loveText").innerHTML=f[1];$("moneyText").innerHTML=f[2];
  $("luckyNum").innerHTML=f[3];$("luckyColor").innerHTML=f[4];$("goodHour").innerHTML=f[5];
  $("yiText").innerHTML=f[6];$("jiText").innerHTML=f[7];$("chongText").innerHTML=f[8];
}

function renderWeek(){
  var w=["周日","周一","周二","周三","周四","周五","周六"];
  var a=[["整体运势不错，适合开始新计划","☀️"],["人际关系良好，沟通顺畅","☀️"],["注意调整状态，适合休息","⛅"],["运势平稳，适合处理日常事务","🌥️"],["社交运回升，适合聚会交流","☀️"],["心情愉悦，适合外出活动","☀️"],["今天精力充沛，适合主动出击","☀️"]];
  var h="";
  for(var i=0;i<7;i++){
    var d2=new Date();d2.setDate(d2.getDate()-(6-i));
    var t=(i===6);var dw=d2.getDay();
    h+='<div class="day-card'+(t?" today":"")+'"><div class="dayname"><div class="weekday">'+(t?"今天":w[dw])+'</div><div class="date-num">'+(d2.getMonth()+1)+"/"+d2.getDate()+'</div></div><div class="summary">'+a[i][0]+'</div><div class="trend">'+a[i][1]+'</div></div>';
  }
  $("weekList").innerHTML=h;
  $("weekSummary").innerHTML="过去一周"+myZodiac+"整体运势平稳，注意把握社交机会";
}

function switchPage(p){
  var ps=document.querySelectorAll(".page"),ns=document.querySelectorAll(".nav-item");
  for(var i=0;i<ps.length;i++)ps[i].className=ps[i].className.replace(" active","");
  for(var i=0;i<ns.length;i++)ns[i].className=ns[i].className.replace(" active","");
  $("page-"+p).className+=" active";
  document.querySelector('[data-page="'+p+'"]').className+=" active";
}

function loadSettings(){
  try{var s=localStorage.getItem("fortune_settings");if(s){var j=JSON.parse(s);myZodiac=j.z||myZodiac;pushOn=j.p!==false;pushTime=j.t||pushTime;showLunar=j.l!==false;}}catch(e){}
  $("pushToggle").className=pushOn?"toggle on":"toggle";
  $("lunarToggle").className=showLunar?"toggle on":"toggle";
  $("pushTimeDisplay").innerHTML=pushTime+" ▸";
  $("zodiacName").innerHTML=myZodiac+" ▸";
}

function saveSettings(){
  try{localStorage.setItem("fortune_settings",JSON.stringify({z:myZodiac,p:pushOn,t:pushTime,l:showLunar}));}catch(e){}
}

function openPicker(){
  if(pickerOpen)return;
  pickerOpen=true;
  var g=$("pickerGrid"),h="";
  for(var i=0;i<zList.length;i++){
    var z=zList[i],s=(z===myZodiac)?" sel":"";
    h+='<div class="picker-item'+s+'" data-z="'+z+'">'+z+'</div>';
  }
  g.innerHTML=h;
  $("zodiacPicker").style.display="flex";
  var items=g.querySelectorAll(".picker-item");
  for(var i=0;i<items.length;i++){
    items[i].onclick=function(){
      myZodiac=this.getAttribute("data-z");
      $("zodiacName").innerHTML=myZodiac+" ▸";
      pickerOpen=false;
      $("zodiacPicker").style.display="none";
      saveSettings();
      renderToday();
    };
  }
}

function init(){
  updateClock();setInterval(updateClock,60000);
  loadSettings();renderToday();renderWeek();

  var ns=document.querySelectorAll(".nav-item");
  for(var i=0;i<ns.length;i++)ns[i].onclick=function(){switchPage(this.getAttribute("data-page"));};

  $("pushToggle").onclick=function(){pushOn=!pushOn;this.className=pushOn?"toggle on":"toggle";saveSettings();};
  $("lunarToggle").onclick=function(){showLunar=!showLunar;this.className=showLunar?"toggle on":"toggle";saveSettings();renderToday();};
  $("pushTimeDisplay").onclick=openTimePicker;
  $("zodiacSetting").onclick=openPicker;
  $("dataSourceItem").onclick=function(){alert("📡 数据来源\n\n所有数据来自公开免费 API：\n1. 天行数据 (tianapi.com)\n2. 香港天文台 (hko.gov.hk)\n\n可在对应网站查证数据真实性");};
  $("pickerCancel").onclick=function(){pickerOpen=false;$("zodiacPicker").style.display="none";};
  $("zodiacPicker").onclick=function(e){if(e.target===this){pickerOpen=false;this.style.display="none";}};
}

function updateClock(){
  var d=new Date();
  $("timeDisplay").innerHTML=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
}

function openTimePicker(){
  var g=timeList,h="";
  var times=[];
  for(var hh=5;hh<=12;hh++){times.push(("0"+hh).slice(-2)+":00");times.push(("0"+hh).slice(-2)+":30");}
  times.push("13:00");times.push("13:30");times.push("14:00");
  for(var i=0;i<times.length;i++){
    var t=times[i],s=(t===pushTime)?" sel":"";
    h+='<div class="time-option'+s+'" data-t="'+t+'">'+t+'</div>';
  }
  g.innerHTML=h;
  timePicker.style.display="flex";
  var opts=g.querySelectorAll(".time-option");
  for(var i=0;i<opts.length;i++){
    opts[i].onclick=function(){
      pushTime=this.getAttribute("data-t");
      pushTimeDisplay.innerHTML=pushTime+" ▸";
      timePicker.style.display="none";
      saveSettings();
    };
  }
}

timeCancel.onclick=function(){timePicker.style.display="none";};
timePicker.onclick=function(e){if(e.target===this)this.style.display="none";};window.onload=init;</script>

<!-- 时间选择弹窗 -->
<div class="picker-overlay" id="timePicker">
  <div class="picker-panel">
    <div class="picker-title">选择推送时间</div>
    <div class="time-scroll-wrap">
      <div class="time-list" id="timeList"></div>
    </div>
    <div class="picker-cancel" id="timeCancel">取消</div>
  </div>
</div>
