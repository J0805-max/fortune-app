function updateClock() {

  g("timeDisplay").innerHTML = h+":"+m;
}

  var navs = document.querySelectorAll(".nav-item");
  for (var i=0; i<pages.length; i++) pages[i].className = pages[i].className.replace(" active","");
  for (var i=0; i<navs.length; i++) navs[i].className = navs[i].className.replace(" active","");
  g("page-"+p).className += " active";
  document.querySelector('[data-page="'+p+'"]').className += " active";
}

function loadSet() {
  try {
    var s = localStorage.getItem("fortune_settings");
    if (s) { var j = JSON.parse(s); for (var k in j) data[k] = j[k]; }
  } catch(e){}
  if (!data.pushEnabled) g("pushToggle").className = "toggle";
  if (!data.showLunar) g("lunarToggle").className = "toggle";
  g("pushTimeDisplay").innerHTML = data.pushTime+" ▸";
  g("zodiacSetting").innerHTML = data.zodiac+" ▸";
}

function saveSet() {
  try { localStorage.setItem("fortune_settings", JSON.stringify({zodiac:data.zodiac,pushEnabled:data.pushEnabled,pushTime:data.pushTime,showLunar:data.showLunar})); } catch(e){}
}

function init() {
  updateClock();
  setInterval(updateClock, 60000);
  loadSet();
  showToday();
  showWeek();

  var navs = document.querySelectorAll(".nav-item");
  for (var i=0; i<navs.length; i++) {
    navs[i].onclick = function(){ switchPage(this.getAttribute("data-page")); };
  }

  g("pushToggle").onclick = function(){
    data.pushEnabled = !data.pushEnabled;
    this.className = data.pushEnabled ? "toggle on" : "toggle";
    saveSet();
  };

  g("lunarToggle").onclick = function(){
    data.showLunar = !data.showLunar;
    this.className = data.showLunar ? "toggle on" : "toggle";
    saveSet();
    showToday();
  };

  g("pushTimeDisplay").onclick = function(){
    var t = prompt("推送时间（格式 HH:MM）", data.pushTime);
    if (t && /^\d{1,2}:\d{2}$/.test(t)) { data.pushTime = t; this.innerHTML = t+" ▸"; saveSet(); }
  };

  g("zodiacSetting").onclick = function(){
    openPicker();
  };

  g("dataSourceItem").onclick = function(){
    alert("📡 数据来源\n\n所有数据来自公开免费 API：\n1. 天行数据 (tianapi.com)\n2. 香港天文台 (hko.gov.hk)\n\n可在对应网站查证数据真实性");
  };
  
  // 星座选择器
  function openPicker() {
    var p = g("zodiacPicker");
    var grid = g("pickerGrid");
    var html = "";
    for (var i=0; i<data.zodiacList.length; i++) {
      var z = data.zodiacList[i];
      var active = (z === data.zodiac) ? ' active' : '';
      html += '<div class="picker-item'+active+'" data-zodiac="'+z+'">'+z+'</div>';
    }
    grid.innerHTML = html;
    p.style.display = "flex";
    
    var items = grid.querySelectorAll(".picker-item");
    for (var i=0; i<items.length; i++) {
      items[i].onclick = function(){
        data.zodiac = this.getAttribute("data-zodiac");
        g("zodiacSetting").innerHTML = data.zodiac+" ▸";
        g("zodiacPicker").style.display = "none";
        saveSet();
        showToday();
      };
    }
  }
  
  g("pickerClose").onclick = function(){
    g("zodiacPicker").style.display = "none";
  };
  g("zodiacPicker").onclick = function(e){
    if (e.target === this) this.style.display = "none";
  };
}

window.onload = init;
</script>
</body>
</html>
